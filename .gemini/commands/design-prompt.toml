description = "UI 리디자인/신규 페이지의 디자인 프롬프트 생성. Use when: 디자인 프롬프트, design prompt, UI 설계, 페이지 설계"

prompt = """
# 디자인 프롬프트 생성

구현 AI가 자율적으로 UI를 설계·구현할 수 있도록, 사용자가 보고 조작하는 것만 선언적으로 기술하는 문서를 생성한다.

## DESIGN.md 선행 참조

- 대상 프로젝트 root `DESIGN.md`가 있으면 prompt 작성 전에 먼저 읽는다.
- `DESIGN.md`가 없으면 `design-system` workflow로 생성을 제안하거나, 부재를 사용자에게 보고한다.
- `DESIGN.md`의 색상/폰트/spacing 토큰을 prompt 본문에 복사하지 않는다.
- 스타일은 `DESIGN.md`가 담당, prompt는 보이는 정보/가능한 조작만 담당한다.

## 작성 원칙

- **선언적 기술만 허용**: "X가 보인다", "Y를 할 수 있다", "Z 조건에서 노출된다"
- **금지**: 위치 지정, UI 패턴 지정, 구현 기술 언급, "기존/현재" 현상 설명, 스타일 토큰 복사

## 실행 순서

1. `DESIGN.md` 존재 확인 → 있으면 읽기, 없으면 부재 보고
2. 대상 페이지와 원하는 변경 확인
3. 보이는 정보와 가능한 조작을 선언형 문장으로 작성
4. 체크리스트 검토 후 저장 (대상 프로젝트 `docs/design-prompt-{주제}.md`)

{{args}}
"""
